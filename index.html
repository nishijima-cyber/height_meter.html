<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>西島工業 建物高さツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      padding: 14px;
      text-align: center;
      font-size: 17px;
      font-weight: bold;
      border-bottom: 2px solid #e94560;
    }

    .photo-area {
      position: relative;
      width: 100%;
      background: #000;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .photo-area img { width: 100%; display: block; }
    .photo-area .placeholder {
      color: #aac4e0;
      font-size: 14px;
      text-align: center;
      padding: 40px 20px;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    /* ルーペ */
    #loupe {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 3px solid #e94560;
      overflow: hidden;
      pointer-events: none;
      display: none;
      box-shadow: 0 0 16px rgba(0,0,0,0.95);
      z-index: 100;
    }

    .controls { padding: 12px; }

    /* モード切替 */
    .mode-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mode-btn {
      flex: 1;
      padding: 12px 6px;
      border: 2px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #aac4e0;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    .mode-btn.active {
      border-color: #e94560;
      color: #fff;
      background: #0f3460;
    }

    .status {
      background: #16213e;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-red { background: #e94560; color: #fff; }
    .btn-green { background: #00c864; color: #fff; }
    .btn-gray { background: transparent; color: #aac4e0; border: 1px solid #333; }
    .btn:disabled { opacity: 0.4; }

    /* 測定結果リスト */
    .results {
      background: #16213e;
      border-radius: 12px;
      padding: 14px;
      margin: 0 12px 12px;
    }
    .results h3 {
      font-size: 14px;
      color: #aac4e0;
      margin-bottom: 10px;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 15px;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item .label { color: #aac4e0; font-size: 13px; }
    .result-item .value { color: #e94560; font-weight: bold; font-size: 18px; }
    .result-item .del {
      background: #333;
      border: none;
      color: #aac4e0;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .desc {
      background: #16213e;
      margin: 12px;
      border-radius: 12px;
      padding: 12px;
      font-size: 12px;
      color: #aac4e0;
      line-height: 1.8;
    }
    .desc strong { color: #e94560; }
  </style>
</head>
<body>

<header>📐 西島工業 建物高さツール</header>

<div class="desc" id="desc">
  <strong>① まず写真を撮影</strong><br>
  ② 「基準設定」モードでGLと1mをタップ<br>
  ③ 「高さ測定」モードで測りたい部分の上下をタップ<br>
  ④ 何度でも繰り返し測定可能
</div>

<div class="photo-area" id="photoArea">
  <div class="placeholder" id="placeholder">📷 下のボタンから写真を撮影してください</div>
  <img id="photo" style="display:none;" />
  <canvas id="canvas"></canvas>
  <div id="loupe"><canvas id="loupeCanvas" width="200" height="200"></canvas></div>
</div>

<div class="controls">
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;" onchange="loadPhoto(event)">
  <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">
    📷 写真を撮影する
  </button>

  <!-- モード切替 -->
  <div class="mode-bar" id="modeBar" style="display:none;">
    <div class="mode-btn active" id="modeRef" onclick="setMode('ref')">
      📏 基準設定<br><small>GL・1m</small>
    </div>
    <div class="mode-btn" id="modeMeasure" onclick="setMode('measure')">
      📐 高さ測定<br><small>何度でも</small>
    </div>
  </div>

  <div class="status" id="status">写真を撮影してください</div>

  <button class="btn btn-gray" id="btnResetRef" onclick="resetRef()" style="display:none;">
    ↩ 基準をリセット
  </button>
  <button class="btn btn-gray" id="btnZoom" onclick="cycleZoom()" style="display:none;">
    🔍 ルーペ倍率：<span id="zoomLabel">4倍</span>（タップで切替）
  </button>
  <button class="btn btn-gray" onclick="resetAll()">🔄 全リセット</button>
</div>

<!-- 測定結果リスト -->
<div class="results" id="results" style="display:none;">
  <h3>📋 測定結果</h3>
  <div id="resultList"></div>
</div>

<script>
  // --- 状態 ---
  let mode = 'ref'; // 'ref' or 'measure'
  let refGL = null;   // GL点
  let ref1m = null;   // 1m点
  let refPxPer1m = null; // 1mあたりのピクセル数
  let measurePts = []; // 現在測定中の点（0:下, 1:上）
  let measurements = []; // 測定結果リスト
  let imgEl = null;

  // --- 写真読み込み ---
  function loadPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      imgEl = document.getElementById('photo');
      imgEl.src = ev.target.result;
      imgEl.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('modeBar').style.display = 'flex';
      document.getElementById('btnResetRef').style.display = 'block';
      document.getElementById('btnZoom').style.display = 'block';
      imgEl.onload = function() {
        const canvas = document.getElementById('canvas');
        canvas.width = imgEl.naturalWidth;
        canvas.height = imgEl.naturalHeight;
        resetAll();
        setMode('ref');
        draw();
      };
    };
    reader.readAsDataURL(file);
  }

  // --- モード切替 ---
  function setMode(m) {
    mode = m;
    document.getElementById('modeRef').className = m === 'ref' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('modeMeasure').className = m === 'measure' ? 'mode-btn active' : 'mode-btn';
    measurePts = [];
    updateStatus();
    draw();
  }

  // --- ステータス更新 ---
  function updateStatus() {
    const el = document.getElementById('status');
    if (mode === 'ref') {
      if (!refGL) {
        el.textContent = '📍 GLの位置をタップしてください';
      } else if (!ref1m) {
        el.textContent = '📍 1mの位置をタップしてください';
      } else {
        el.textContent = '✅ 基準設定完了！\n「高さ測定」モードに切り替えてください';
      }
    } else {
      if (!refPxPer1m) {
        el.textContent = '⚠️ 先に「基準設定」でGL・1mをタップしてください';
      } else if (measurePts.length === 0) {
        el.textContent = '📍 測定する部分の\n下（低い方）をタップしてください';
      } else if (measurePts.length === 1) {
        el.textContent = '📍 測定する部分の\n上（高い方）をタップしてください';
      } else {
        el.textContent = '✅ 測定完了！続けて測定できます';
      }
    }
  }

  // --- タッチ処理 ---
  const canvas = document.getElementById('canvas');

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const pt = getCanvasPoint(touch.clientX, touch.clientY);
    showLoupe(touch.clientX, touch.clientY, pt.x, pt.y);
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const pt = getCanvasPoint(touch.clientX, touch.clientY);
    showLoupe(touch.clientX, touch.clientY, pt.x, pt.y);
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    const touch = e.changedTouches[0];
    const pt = getCanvasPoint(touch.clientX, touch.clientY);
    hideLoupe();
    handleTap(pt.x, pt.y);
  }, { passive: false });

  canvas.addEventListener('click', function(e) {
    const pt = getCanvasPoint(e.clientX, e.clientY);
    handleTap(pt.x, pt.y);
  });

  function handleTap(x, y) {
    if (mode === 'ref') {
      if (!refGL) {
        refGL = { x, y };
      } else if (!ref1m) {
        ref1m = { x, y };
        // 1mのピクセル数計算
        const dy = Math.abs(refGL.y - ref1m.y);
        refPxPer1m = dy;
      }
    } else {
      if (!refPxPer1m) return;
      if (measurePts.length < 2) {
        measurePts.push({ x, y });
        if (measurePts.length === 2) {
          // 高さ計算
          const dy = Math.abs(measurePts[0].y - measurePts[1].y);
          const heightM = dy / refPxPer1m;
          const heightMm = Math.round(heightM * 1000);
          measurements.push({
            label: '測定' + (measurements.length + 1),
            mm: heightMm,
            m: Math.round(heightM * 100) / 100,
            pts: [...measurePts],
          });
          renderResults();
          measurePts = [];
        }
      }
    }
    draw();
    updateStatus();
  }

  // --- 描画 ---
  function draw() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 基準点
    if (refGL) drawPin(ctx, refGL, 'GL', '#00c864');
    if (ref1m) drawPin(ctx, ref1m, '1m', '#ffcc00');
    if (refGL && ref1m) {
      ctx.beginPath();
      ctx.setLineDash([12, 8]);
      ctx.moveTo(refGL.x, refGL.y);
      ctx.lineTo(ref1m.x, ref1m.y);
      ctx.strokeStyle = '#ffcc0088';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // 測定中の点
    measurePts.forEach(function(pt, i) {
      drawPin(ctx, pt, i === 0 ? '下' : '上', i === 0 ? '#4488ff' : '#e94560');
    });
    if (measurePts.length === 2) {
      ctx.beginPath();
      ctx.moveTo(measurePts[0].x, measurePts[0].y);
      ctx.lineTo(measurePts[1].x, measurePts[1].y);
      ctx.strokeStyle = '#e9456088';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    // 過去の測定結果
    measurements.forEach(function(m, i) {
      const colors = ['#ff8844', '#44aaff', '#aa44ff', '#44ffaa'];
      const c = colors[i % colors.length];
      drawPin(ctx, m.pts[0], '↓', c);
      drawPin(ctx, m.pts[1], '↑', c);
      ctx.beginPath();
      ctx.moveTo(m.pts[0].x, m.pts[0].y);
      ctx.lineTo(m.pts[1].x, m.pts[1].y);
      ctx.strokeStyle = c + '88';
      ctx.lineWidth = 3;
      ctx.stroke();
      // 高さラベル
      const midX = (m.pts[0].x + m.pts[1].x) / 2 + 40;
      const midY = (m.pts[0].y + m.pts[1].y) / 2;
      ctx.fillStyle = c;
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(m.m + 'm', midX, midY);
    });
  }

  function drawPin(ctx, pt, label, color) {
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 26, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, pt.x, pt.y);
  }

  // --- ルーペ ---
  let loupeZoom = 4; // デフォルト4倍

  function cycleZoom() {
    const zoomLevels = [3, 4, 6, 8];
    const idx = zoomLevels.indexOf(loupeZoom);
    loupeZoom = zoomLevels[(idx + 1) % zoomLevels.length];
    document.getElementById('zoomLabel').textContent = loupeZoom + '倍';
  }

  function showLoupe(clientX, clientY, canvasX, canvasY) {
    const loupe = document.getElementById('loupe');
    const loupeCanvas = document.getElementById('loupeCanvas');
    const area = document.getElementById('photoArea');
    const areaRect = area.getBoundingClientRect();
    const size = 200;

    // ルーペ位置：指の上に表示
    let lx = clientX - areaRect.left - size / 2;
    let ly = clientY - areaRect.top - size - 30;
    if (ly < 0) ly = clientY - areaRect.top + 40;
    loupe.style.left = lx + 'px';
    loupe.style.top = ly + 'px';
    loupe.style.display = 'block';

    const ctx = loupeCanvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);

    // 高品質レンダリング設定
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // 画像の元サイズで切り出す範囲
    const sw = size / loupeZoom;
    const sh = size / loupeZoom;
    const sx = Math.max(0, canvasX - sw / 2);
    const sy = Math.max(0, canvasY - sh / 2);

    // 元画像のみ拡大描画（ピンは描かない）
    if (imgEl) ctx.drawImage(imgEl, sx, sy, sw, sh, 0, 0, size, size);

    // 十字線
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(size/2, 0); ctx.lineTo(size/2, size);
    ctx.moveTo(0, size/2); ctx.lineTo(size, size/2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(233,69,96,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(size/2, 0); ctx.lineTo(size/2, size);
    ctx.moveTo(0, size/2); ctx.lineTo(size, size/2);
    ctx.stroke();

    // 中心ドット
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(size/2, size/2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // ズーム倍率表示
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, size - 22, 44, 22);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(loupeZoom + 'x', 5, size - 11);
  }

  function hideLoupe() {
    document.getElementById('loupe').style.display = 'none';
  }

  // --- 結果表示 ---
  function renderResults() {
    const list = document.getElementById('resultList');
    const box = document.getElementById('results');
    if (measurements.length === 0) {
      box.style.display = 'none';
      return;
    }
    box.style.display = 'block';
    list.innerHTML = measurements.map(function(m, i) {
      return `<div class="result-item">
        <div>
          <div class="label">${m.label}</div>
          <div class="value">${m.m} m</div>
          <div class="label">${m.mm} mm</div>
        </div>
        <button class="del" onclick="deleteMeasure(${i})">削除</button>
      </div>`;
    }).join('');
  }

  function deleteMeasure(i) {
    measurements.splice(i, 1);
    measurements.forEach(function(m, j) { m.label = '測定' + (j+1); });
    renderResults();
    draw();
  }

  // --- リセット ---
  function resetRef() {
    refGL = null;
    ref1m = null;
    refPxPer1m = null;
    measurePts = [];
    setMode('ref');
    draw();
    updateStatus();
  }

  function resetAll() {
    refGL = null;
    ref1m = null;
    refPxPer1m = null;
    measurePts = [];
    measurements = [];
    renderResults();
    draw();
    updateStatus();
  }

  // --- ユーツィリツィ ---
  function getCanvasPoint(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY,
    };
  }
</script>

</body>
</html>
