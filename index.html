<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建物高さ測定ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      background: #16213e;
      width: 100%;
      padding: 14px;
      text-align: center;
      font-size: 17px;
      font-weight: bold;
      border-bottom: 2px solid #0f3460;
      z-index: 10;
    }
    .camera-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      background: #000;
      aspect-ratio: 4/3;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .crosshair {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(233,69,96,0.8);
    }
    .crosshair::before {
      width: 100%; height: 2px;
      top: 50%; left: 0;
      transform: translateY(-50%);
    }
    .crosshair::after {
      width: 2px; height: 100%;
      left: 50%; top: 0;
      transform: translateX(-50%);
    }
    .crosshair-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      border: 2px solid #e94560;
      border-radius: 50%;
    }
    .camera-angle {
      position: absolute;
      bottom: 8px; left: 0; right: 0;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #e94560;
      text-shadow: 0 0 8px rgba(0,0,0,0.9);
    }
    .camera-label {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 6px;
    }
    .no-camera {
      width: 100%;
      aspect-ratio: 4/3;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #aac4e0;
      text-align: center;
      padding: 20px;
    }
    .main {
      width: 100%;
      max-width: 480px;
      padding: 16px;
      flex: 1;
    }
    .input-section {
      background: #16213e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .input-section label {
      display: block;
      font-size: 13px;
      color: #aac4e0;
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 8px;
      color: #fff;
      font-size: 22px;
      padding: 10px;
      text-align: center;
      outline: none;
    }
    .input-row span { color: #aac4e0; font-size: 14px; }
    .angle-display {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }
    .angle-item label {
      display: block;
      font-size: 11px;
      color: #aac4e0;
      margin-bottom: 4px;
    }
    .angle-item .val {
      font-size: 20px;
      font-weight: bold;
      color: #e94560;
    }
    .angle-item .unit { font-size: 11px; color: #aac4e0; }
    .measure-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-start { background: #e94560; color: #fff; }
    .btn-base { background: #0f3460; color: #fff; border: 2px solid #e94560; }
    .btn-top { background: #e94560; color: #fff; }
    .btn-calc { background: #533483; color: #fff; }
    .btn-reset { background: transparent; color: #aac4e0; border: 1px solid #333; margin-top: 4px; }
    .btn:disabled { opacity: 0.4; }
    .status {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      color: #aac4e0;
      margin-bottom: 12px;
      text-align: center;
    }
    .result-section {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }
    .result-section.show { display: block; }
    .result-label { font-size: 13px; color: #aac4e0; margin-bottom: 6px; }
    .result-height { font-size: 52px; font-weight: bold; color: #e94560; line-height: 1; }
    .result-unit { font-size: 18px; color: #aac4e0; }
    .result-floors { margin-top: 10px; font-size: 15px; color: #aac4e0; }
    .result-note { margin-top: 10px; font-size: 11px; color: #555; }
    .step-badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      border-radius: 50%;
      width: 22px; height: 22px;
      line-height: 22px;
      text-align: center;
      font-size: 12px;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<header>📐 建物高さ測定ツール</header>

<div class="camera-wrap" id="cameraWrap">
  <div class="no-camera" id="noCameraMsg">📷 下の「カメラ＆センサーを起動」を押してください</div>
  <video id="video" autoplay playsinline style="display:none;"></video>
  <div class="crosshair" id="crosshair" style="display:none;">
    <div class="crosshair-center"></div>
  </div>
  <div class="camera-label" id="cameraLabel" style="display:none;">照準を合わせてボタンを押す</div>
  <div class="camera-angle" id="cameraAngle" style="display:none;">-- °</div>
</div>

<div class="main">

  <div class="input-section">
    <label><span class="step-badge">1</span>建物までの距離（目測でOK）</label>
    <div class="input-row">
      <input type="number" id="distance" placeholder="例：10" min="1" max="500">
      <span>メートル</span>
    </div>
  </div>

  <div class="angle-display">
    <div class="angle-item">
      <label>足元の角度</label>
      <div class="val" id="baseAngle">--</div>
      <div class="unit">度</div>
    </div>
    <div class="angle-item">
      <label>頂上の角度</label>
      <div class="val" id="topAngle">--</div>
      <div class="unit">度</div>
    </div>
    <div class="angle-item">
      <label>現在の角度</label>
      <div class="val" id="currentAngle">--</div>
      <div class="unit">度</div>
    </div>
  </div>

  <div class="status" id="status">まず「カメラ＆センサーを起動」を押してください。</div>

  <div class="measure-section">
    <button class="btn btn-start" id="btnSensor" onclick="startSensor()">
      🔓 ① センサーを許可する
    </button>
    <button class="btn" id="btnCamera" onclick="startCamera()" style="background:#0f3460;color:#fff;border:2px solid #e94560;">
      📷 ② カメラを起動する
    </button>
    <button class="btn btn-base" id="btnBase" onclick="measureBase()" disabled>
      <span class="step-badge">2</span>照準を足元に合わせて測定
    </button>
    <button class="btn btn-top" id="btnTop" onclick="measureTop()" disabled>
      <span class="step-badge">3</span>照準を頂上に合わせて測定
    </button>
    <button class="btn btn-calc" id="btnCalc" onclick="calculate()" disabled>
      <span class="step-badge">4</span>高さを計算する
    </button>
  </div>

  <div class="result-section" id="result">
    <div class="result-label">推定建物高さ</div>
    <div>
      <span class="result-height" id="resultHeight">--</span>
      <span class="result-unit"> m</span>
    </div>
    <div class="result-floors" id="resultFloors"></div>
    <div class="result-note">※目測距離により誤差があります。参考値としてご使用ください。</div>
  </div>

  <button class="btn btn-reset" onclick="resetAll()">🔄 リセット</button>

</div>

<script>
  let baseAngleDeg = null;
  let topAngleDeg = null;
  let currentAngleDeg = 0;
  let sensorActive = false;

  function updateStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  // センサー許可（iOSはawaitなしで直接呼ぶ）
  function startSensor() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(function(res) {
        if (res === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
          sensorActive = true;
          document.getElementById('btnSensor').textContent = '✅ センサーOK';
          document.getElementById('btnSensor').disabled = true;
          updateStatus('センサーOK！次に②カメラを起動してください。');
        } else {
          updateStatus('⚠️ センサーが拒否されました。設定から許可してください。');
        }
      }).catch(function(e) {
        updateStatus('⚠️ センサーエラー: ' + e.message);
      });
    } else if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', handleOrientation);
      sensorActive = true;
      document.getElementById('btnSensor').textContent = '✅ センサーOK';
      document.getElementById('btnSensor').disabled = true;
      updateStatus('センサーOK！次に②カメラを起動してください。');
    } else {
      sensorActive = false;
      document.getElementById('btnSensor').textContent = '⚠️ センサーなし';
      document.getElementById('btnSensor').disabled = true;
      updateStatus('センサーなし。次に②カメラを起動してください。');
    }
  }

  // カメラ起動
  async function startCamera() {
    document.getElementById('btnCamera').disabled = true;
    document.getElementById('btnCamera').textContent = '起動中...';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.style.display = 'block';
      document.getElementById('noCameraMsg').style.display = 'none';
      document.getElementById('crosshair').style.display = 'block';
      document.getElementById('cameraLabel').style.display = 'block';
      document.getElementById('cameraAngle').style.display = 'block';
      document.getElementById('btnCamera').textContent = '✅ カメラOK';
    } catch(e) {
      document.getElementById('noCameraMsg').textContent = '⚠️ カメラなし。センサーのみで動作します。';
      document.getElementById('btnCamera').textContent = '⚠️ カメラなし';
    }
    document.getElementById('btnBase').disabled = false;
    updateStatus('起動完了！照準を建物の足元に合わせて「足元測定」を押してください。');
  }

  function handleOrientation(event) {
    let beta = event.beta;
    if (beta === null) return;
    currentAngleDeg = -beta;
    document.getElementById('currentAngle').textContent = currentAngleDeg.toFixed(1);
    document.getElementById('cameraAngle').textContent = currentAngleDeg.toFixed(1) + '°';
  }

  function measureBase() {
    if (!sensorActive) {
      let val = prompt('足元の角度を入力（例：-5）', '-5');
      if (val === null) return;
      baseAngleDeg = parseFloat(val);
    } else {
      baseAngleDeg = currentAngleDeg;
    }
    document.getElementById('baseAngle').textContent = baseAngleDeg.toFixed(1);
    document.getElementById('btnTop').disabled = false;
    updateStatus('✅ 足元を記録！次に照準を屋上・頂上に合わせて「頂上測定」を押してください。');
  }

  function measureTop() {
    if (!sensorActive) {
      let val = prompt('頂上の角度を入力（例：30）', '30');
      if (val === null) return;
      topAngleDeg = parseFloat(val);
    } else {
      topAngleDeg = currentAngleDeg;
    }
    document.getElementById('topAngle').textContent = topAngleDeg.toFixed(1);
    document.getElementById('btnCalc').disabled = false;
    updateStatus('✅ 頂上を記録！「高さを計算」を押してください。');
  }

  function calculate() {
    const distance = parseFloat(document.getElementById('distance').value);
    if (!distance || distance <= 0) {
      alert('建物までの距離を入力してください');
      return;
    }
    if (baseAngleDeg === null || topAngleDeg === null) {
      alert('足元と頂上を測定してください');
      return;
    }
    const topRad = topAngleDeg * Math.PI / 180;
    const baseRad = baseAngleDeg * Math.PI / 180;
    const height = distance * (Math.tan(topRad) - Math.tan(baseRad));
    if (height <= 0) {
      alert('測定値が正しくありません。足元→頂上の順に測定してください。');
      return;
    }
    const heightRounded = Math.round(height * 10) / 10;
    const floors = Math.round(height / 3);
    document.getElementById('resultHeight').textContent = heightRounded;
    document.getElementById('resultFloors').textContent = `約 ${floors} 階建て相当（1階≒3m換算）`;
    document.getElementById('result').classList.add('show');
    updateStatus('✅ 計算完了！建物高さ約 ' + heightRounded + 'm');
  }

  function resetAll() {
    baseAngleDeg = null;
    topAngleDeg = null;
    document.getElementById('baseAngle').textContent = '--';
    document.getElementById('topAngle').textContent = '--';
    document.getElementById('distance').value = '';
    document.getElementById('btnTop').disabled = true;
    document.getElementById('btnCalc').disabled = true;
    document.getElementById('result').classList.remove('show');
    updateStatus('リセットしました。距離を入力してください。');
  }
</script>

</body>
</html>
