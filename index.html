<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建物高さ測定ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      padding: 14px;
      text-align: center;
      font-size: 17px;
      font-weight: bold;
      border-bottom: 2px solid #e94560;
    }
    .desc {
      background: #16213e;
      margin: 12px;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: #aac4e0;
      line-height: 1.8;
    }
    .desc strong { color: #e94560; }

    .photo-area {
      position: relative;
      width: 100%;
      background: #000;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-area img {
      width: 100%;
      display: block;
    }
    .photo-area .placeholder {
      color: #aac4e0;
      font-size: 14px;
      text-align: center;
      padding: 40px 20px;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    .controls {
      padding: 12px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-red { background: #e94560; color: #fff; }
    .btn-purple { background: #533483; color: #fff; }
    .btn-gray { background: transparent; color: #aac4e0; border: 1px solid #333; }
    .btn:disabled { opacity: 0.4; }

    .status {
      background: #16213e;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .status.done { color: #e94560; }

    .result-box {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      margin: 0 12px 12px;
      display: none;
    }
    .result-box.show { display: block; }
    .result-label { font-size: 14px; color: #aac4e0; margin-bottom: 8px; }
    .result-height { font-size: 64px; font-weight: bold; color: #e94560; line-height: 1; }
    .result-unit { font-size: 22px; color: #aac4e0; }
    .result-sub { margin-top: 12px; font-size: 16px; color: #aac4e0; }
    .result-note { margin-top: 10px; font-size: 12px; color: #555; }
  </style>
</head>
<body>

<header>📐 建物高さ測定ツール</header>

<div class="desc">
  <strong>使い方：</strong><br>
  ① 建物全体が映るように写真を撮る<br>
  ② 写真上の <strong>GL（地面）</strong> をタップ → 緑ピン<br>
  ③ 壁の <strong>1mの位置</strong> をタップ → 黄ピン<br>
  ④ 建物の <strong>最高部</strong> をタップ → 赤ピン<br>
  ⑤ 自動で高さを計算
</div>

<div class="photo-area" id="photoArea">
  <div class="placeholder" id="placeholder">📷 下のボタンから写真を撮影してください</div>
  <img id="photo" style="display:none;" />
  <canvas id="canvas"></canvas>
</div>

<div class="controls">
  <div class="status" id="status">写真を撮影してください</div>

  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;" onchange="loadPhoto(event)">
  <button class="btn btn-red" onclick="document.getElementById('fileInput').click()">
    📷 写真を撮影する
  </button>

  <button class="btn btn-purple" id="btnReset" onclick="resetPins()" style="display:none;">
    ↩ ピンをリセット
  </button>
</div>

<div class="result-box" id="result">
  <div class="result-label">推定建物高さ</div>
  <div>
    <span class="result-height" id="resultHeight">--</span>
    <span class="result-unit"> m</span>
  </div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-note">※1mの基準点の精度により誤差が生じる場合があります</div>
</div>

<div class="controls">
  <button class="btn btn-gray" onclick="resetAll()">🔄 全リセット</button>
</div>

<script>
  let pins = []; // 0:GL, 1:1m点, 2:TOP
  let imgNaturalW = 1, imgNaturalH = 1;
  let imgDisplayW = 1, imgDisplayH = 1;

  const PIN_LABELS = ['GL', '1m', 'TOP'];
  const PIN_COLORS = ['#00c864', '#ffcc00', '#e94560'];
  const STATUS_MSGS = [
    '📍 GL（地面）の位置をタップしてください',
    '📍 壁の1m地点をタップしてください',
    '📍 建物の最高部をタップしてください',
    '✅ 計測完了！',
  ];

  function loadPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = document.getElementById('photo');
      img.src = ev.target.result;
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('btnReset').style.display = 'block';
      img.onload = function() {
        imgNaturalW = img.naturalWidth;
        imgNaturalH = img.naturalHeight;
        const canvas = document.getElementById('canvas');
        canvas.width = imgNaturalW;
        canvas.height = imgNaturalH;
        pins = [];
        draw();
        updateStatus();
      };
    };
    reader.readAsDataURL(file);
  }

  // タップ処理
  document.getElementById('canvas').addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (pins.length >= 3) return;
    const touch = e.touches[0];
    const pt = getCanvasPoint(touch.clientX, touch.clientY);
    addPin(pt.x, pt.y);
  }, { passive: false });

  document.getElementById('canvas').addEventListener('click', function(e) {
    if (pins.length >= 3) return;
    const pt = getCanvasPoint(e.clientX, e.clientY);
    addPin(pt.x, pt.y);
  });

  function getCanvasPoint(clientX, clientY) {
    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY,
    };
  }

  function addPin(x, y) {
    pins.push({ x, y });
    draw();
    updateStatus();
    if (pins.length === 3) {
      setTimeout(calculate, 300);
    }
  }

  function draw() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pins.forEach(function(pin, i) {
      // 円
      ctx.beginPath();
      ctx.arc(pin.x, pin.y, 28, 0, Math.PI * 2);
      ctx.fillStyle = PIN_COLORS[i];
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.stroke();

      // ラベル
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(PIN_LABELS[i], pin.x, pin.y);

      // GL〜TOPの線
      if (i > 0) {
        ctx.beginPath();
        ctx.setLineDash([10, 8]);
        ctx.moveTo(pins[i-1].x, pins[i-1].y);
        ctx.lineTo(pin.x, pin.y);
        ctx.strokeStyle = PIN_COLORS[i];
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }

  function updateStatus() {
    const el = document.getElementById('status');
    el.textContent = STATUS_MSGS[pins.length] || STATUS_MSGS[3];
    el.className = pins.length >= 3 ? 'status done' : 'status';
  }

  function calculate() {
    // GLとTOPのy座標差 = 建物全体のピクセル
    const glY  = pins[0].y;
    const oneM = pins[1].y;
    const topY = pins[2].y;

    // 1mのピクセル数（GL〜1m点）
    const oneMpx = Math.abs(glY - oneM);
    if (oneMpx === 0) {
      alert('GLと1m点が同じ位置です。正しくタップしてください。');
      return;
    }

    // 建物全体のピクセル数（GL〜TOP）
    const buildingPx = Math.abs(glY - topY);

    // 高さ = (建物px ÷ 1mのpx) × 1m
    const heightM = buildingPx / oneMpx;
    const heightMm = Math.round(heightM * 1000);
    const heightRounded = Math.round(heightM * 10) / 10;
    const floors = Math.round(heightM / 3);

    document.getElementById('resultHeight').textContent = heightRounded;
    document.getElementById('resultSub').textContent =
      `= ${heightMm} mm ／ 約 ${floors} 階建て相当`;
    document.getElementById('result').classList.add('show');
  }

  function resetPins() {
    pins = [];
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('result').classList.remove('show');
    updateStatus();
  }

  function resetAll() {
    pins = [];
    document.getElementById('photo').style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
    document.getElementById('btnReset').style.display = 'none';
    document.getElementById('result').classList.remove('show');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('status').textContent = '写真を撮影してください';
    document.getElementById('status').className = 'status';
    document.getElementById('fileInput').value = '';
  }
</script>

</body>
</html>
